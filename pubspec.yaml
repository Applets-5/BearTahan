name: bear_tahan
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Default Icons
  cupertino_icons: ^1.0.8

  # Firebase core
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0

  # Auth
  google_sign_in: ^6.3.0
  local_auth: ^3.0.1
  # State management 
  flutter_riverpod: ^3.3.1

  # Audio
  flutter_tts: ^4.0.0
  audioplayers: ^6.1.1
  flutter_cache_manager: ^3.4.1

  # Routing
  go_router: ^17.2.3

  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.6
  path_provider: ^2.1.5
  firebase_ui_oauth_google: ^2.0.1
  stroke_order_animator: ^3.3.1
  fl_chart: ^1.2.0
  cloud_functions: ^6.3.2
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/google.webp
    - assets/images/
    - assets/audio/
    - assets/hanzi/
