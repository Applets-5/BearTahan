name: Flutter CI

on:
  push:
    branches: ["**"]          # runs on every branch push
  pull_request:
    branches: [main, sprint-*] # runs on PRs to main and sprint branches

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"   # pin to your team's version
          channel: "stable"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      
      - name: Analyse code
        run: flutter analyze
      
      - name: Run tests
        run: flutter test